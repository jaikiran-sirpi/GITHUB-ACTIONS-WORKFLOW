name: TASK2

on: workflow_dispatch

env:
  IMAGE_NAME: pythonimage
  IMAGE_TAG: Task
  
jobs:
  job-1:
     runs-on: ubuntu-latest
     steps:
       - name: checkout
         uses: actions/checkout@v5
       - name: set-up
         uses: docker/setup-buildx-action@v3
       - name: login
         uses: docker/login-action@v3
         with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_TOKEN }}
       - name: Build and Push Docker Image
         uses: docker/build-push-action@v5
         with:
           context: .
           push: true
           tags: |
             ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
             ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
         
       - name: ssh into vm
         uses: appleboy/ssh-action@v1.0.3
         with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USERNAME }}
            key: ${{secrets.SERVER_PASSWORD }}
            port: ${{ secrets.SERVER_PORT }}
            script: |
              docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{secrets.DOCKER_TOKEN }}
              docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
              docker run -itd -p 19000:8000 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} 
              
